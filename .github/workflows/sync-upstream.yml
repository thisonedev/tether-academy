name: sync upstream

# Pulls the latest examples from github.com/tetherto/qvac and runs the
# sample-sync report against the vendored lesson copies. Pure correctness
# check: the workflow fails only on real API drift (a vendored call is
# gone from upstream) or a missing upstream file. Minor upstream changes
# (new functions, comments, reorders) print "All lessons in sync." and
# stay green.
#
# The full report is printed in the workflow log. To fix an api-drift
# failure, edit the matching `examples/qvac/<lesson>.answer.ts` + lesson
# text to match the new upstream API and commit.
#
# Triggers:
#   - daily at 06:00 UTC (off-peak, ~30s run)
#   - manual via the Actions tab (workflow_dispatch)
#   - every push to master (catches new lessons that should opt in)
#   - PRs that touch courses/, examples/, or the sync script

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'courses/**'
      - 'examples/qvac/**'
      - 'scripts/sync-examples.mjs'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'courses/**'
      - 'examples/qvac/**'
      - 'scripts/sync-examples.mjs'
      - 'package.json'
      - 'package-lock.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout lesson repo
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: clone upstream
        # Shallow clone of the QVAC SDK repo into a clean directory.
        # This is the source of truth; we never compare against
        # references/qvac/ in CI.
        env:
          UPSTREAM_REPO: 'https://github.com/tetherto/qvac.git'
        run: |
          set -euo pipefail
          git clone --depth 1 --filter=blob:none --sparse "$UPSTREAM_REPO" /tmp/qvac-upstream
          cd /tmp/qvac-upstream
          git sparse-checkout set packages/sdk/examples

      - name: run sync report
        env:
          QVAC_REFERENCES_DIR: /tmp/qvac-upstream
        run: |
          set -euo pipefail
          echo "▸ comparing examples/qvac/*.answer.ts against $(cat /tmp/qvac-upstream/.git/HEAD 2>/dev/null || echo 'unknown')"
          npm run sync:examples:check
